<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Competitions - Evntra</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <h1 class="logo">Evntra</h1>
                </div>
                <ul class="nav-links"></ul>
            </div>
        </nav>

        <div class="container" style="margin-top: 40px; margin-bottom: 60px;">
            <h1 style="margin-bottom: 30px;">Approve Competitions</h1>

            <!-- Filters -->
            <div class="card" style="margin-bottom: 30px;">
                <div class="card-body">
                    <div class="grid" style="grid-template-columns: 1fr 1fr auto;">
                        <div class="form-group">
                            <label for="statusFilter">Status</label>
                            <select id="statusFilter" onchange="filterCompetitions()">
                                <option value="pending">Pending</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="categoryFilter">Category</label>
                            <select id="categoryFilter" onchange="filterCompetitions()">
                                <option value="">All Categories</option>
                                <option value="academic">Academic</option>
                                <option value="sports">Sports</option>
                                <option value="technical">Technical</option>
                                <option value="cultural">Cultural</option>
                            </select>
                        </div>
                        <div style="margin-top: 1.5rem;">
                            <button class="btn btn-primary">Refresh</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pending Competitions -->
            <div id="competitionsList" class="grid grid-2" style="gap: 20px;"></div>
        </div>

        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 Evntra. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal for Details -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Competition Details</h2>
                <button class="close-btn" onclick="closeModal('detailsModal')">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('detailsModal')">Close</button>
                <button class="btn btn-success" onclick="approveCompetition()">Approve</button>
                <button class="btn btn-danger" onclick="rejectCompetition()">Reject</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        let currentCompetitionId = null;

        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            loadPendingCompetitions();
        });

        async function loadPendingCompetitions() {
            try {
                const response = await fetch('/api/competitions.php?status=pending');
                const data = await response.json();
                
                const list = document.getElementById('competitionsList');
                
                if (data.competitions && data.competitions.length > 0) {
                    list.innerHTML = data.competitions.map(comp => `
                        <div class="card">
                            <div style="padding: 20px; background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white;">
                                <h3 style="margin: 0; color: white;">${comp.title}</h3>
                                <p style="margin: 5px 0 0 0; opacity: 0.9; font-size: 0.9rem;">By ${comp.organizer || 'Unknown'}</p>
                            </div>
                            <div class="card-body">
                                <p style="color: #95a5a6; margin: 0 0 10px 0;"><strong>Category:</strong> ${comp.category}</p>
                                <p style="color: #7f8c8d; line-height: 1.5; margin: 0 0 15px 0;">${comp.description || 'No description'}</p>
                                <p style="color: #95a5a6; margin: 0 0 15px 0;">
                                    <strong>Dates:</strong> ${comp.startDate} to ${comp.endDate}
                                </p>
                                <div style="display: flex; gap: 10px;">
                                    <button class="btn btn-primary" style="flex: 1;" onclick="viewDetails(${comp.id})">View Details</button>
                                    <button class="btn btn-success" onclick="quickApprove(${comp.id})">Approve</button>
                                    <button class="btn btn-danger" onclick="quickReject(${comp.id})">Reject</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #95a5a6; padding: 40px;">No pending competitions</p>';
                }
            } catch (error) {
                console.error('Error loading competitions:', error);
            }
        }

        function viewDetails(compId) {
            currentCompetitionId = compId;
            // TODO: Fetch and display competition details in modal
            alert(`Viewing competition ${compId}`);
        }

        function quickApprove(compId) {
            if (confirm('Approve this competition?')) {
                updateCompetitionStatus(compId, 'approved');
            }
        }

        function quickReject(compId) {
            if (confirm('Reject this competition?')) {
                updateCompetitionStatus(compId, 'rejected');
            }
        }

        function approveCompetition() {
            updateCompetitionStatus(currentCompetitionId, 'approved');
        }

        function rejectCompetition() {
            updateCompetitionStatus(currentCompetitionId, 'rejected');
        }

        async function updateCompetitionStatus(compId, status) {
            try {
                const response = await fetch(`/api/competitions.php?id=${compId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });

                const data = await response.json();
                if (data.success) {
                    alert(`Competition ${status}!`);
                    loadPendingCompetitions();
                    closeModal('detailsModal');
                } else {
                    alert('Failed to update competition');
                }
            } catch (error) {
                console.error('Error updating competition:', error);
            }
        }

        function filterCompetitions() {
            loadPendingCompetitions();
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.remove('active');
        }

        function checkAuthStatus() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('token');
            
            if (!user || !token || user.role !== 'admin') {
                window.location.href = '/?page=login';
                return;
            }

            const navLinks = document.querySelector('.nav-links');
            if (navLinks) {
                navLinks.innerHTML = `
                    <li><a href="#" class="nav-link" onclick="navigateTo('admin-dashboard')">Dashboard</a></li>
                    <li><a href="#" class="nav-link" onclick="logout()">Logout</a></li>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }

        function navigateTo(page) {
            window.location.href = `/?page=${page}`;
        }
    </script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
