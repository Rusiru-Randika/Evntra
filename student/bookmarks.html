<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarks - Evntra</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <h1 class="logo">Evntra</h1>
                </div>
                <ul class="nav-links"></ul>
            </div>
        </nav>

        <div class="container" style="margin-top: 40px; margin-bottom: 60px;">
            <h1 style="margin-bottom: 30px;">My Bookmarks</h1>

            <div id="bookmarksList" class="grid grid-3"></div>

            <div id="emptyState" style="text-align: center; padding: 60px 20px; display: none;">
                <h2 style="color: #95a5a6; margin-bottom: 20px;">No Bookmarks Yet</h2>
                <p style="color: #95a5a6; margin-bottom: 30px;">Start bookmarking competitions you're interested in</p>
                <a href="#" onclick="navigateTo('browse')" class="btn btn-primary">Browse Competitions</a>
            </div>
        </div>

        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 Evntra. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            loadBookmarks();
        });

        async function loadBookmarks() {
            try {
                const response = await fetch('/api/bookmark.php');
                const data = await response.json();
                
                const listContainer = document.getElementById('bookmarksList');
                const emptyState = document.getElementById('emptyState');

                if (data.bookmarks && data.bookmarks.length > 0) {
                    emptyState.style.display = 'none';
                    listContainer.innerHTML = data.bookmarks.map(bookmark => `
                        <div class="card">
                            <div style="padding: 20px; background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); color: white;">
                                <h3 style="margin: 0; color: white;">${bookmark.title}</h3>
                            </div>
                            <div class="card-body">
                                <p style="color: #95a5a6; margin: 0 0 10px 0;">${bookmark.category || 'General'}</p>
                                <p style="margin: 0 0 20px 0; color: #7f8c8d;">${bookmark.description || 'No description'}</p>
                                <div style="display: flex; gap: 10px;">
                                    <button class="btn btn-primary" style="flex: 1;">View</button>
                                    <button class="btn btn-danger" onclick="removeBookmark(${bookmark.id})">Remove</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading bookmarks:', error);
            }
        }

        function removeBookmark(id) {
            if (confirm('Remove this bookmark?')) {
                fetch(`/api/bookmark.php?id=${id}`, { method: 'DELETE' })
                    .then(() => loadBookmarks());
            }
        }

        function checkAuthStatus() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('token');
            
            if (!user || !token) {
                window.location.href = '/?page=login';
                return;
            }

            const navLinks = document.querySelector('.nav-links');
            if (navLinks) {
                const userRole = user.role || 'student';
                navLinks.innerHTML = `
                    <li><a href="#" class="nav-link" onclick="navigateTo('${userRole}-dashboard')">Dashboard</a></li>
                    <li><a href="#" class="nav-link" onclick="navigateTo('browse')">Browse</a></li>
                    <li><a href="#" class="nav-link" onclick="logout()">Logout</a></li>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }

        function navigateTo(page) {
            window.location.href = `/?page=${page}`;
        }
    </script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
